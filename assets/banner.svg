<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Circuit traces -->
  <g stroke="#2f81f7" stroke-width="2" opacity="0.35" fill="none">
    <path d="M60 80 H300 V120 H520"/>
    <path d="M80 210 H420 V170 H700"/>
    <path d="M860 60 V150 H1080"/>
    <path d="M920 240 H1140"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#58A6FF">
    <circle cx="300" cy="80" r="5"/>
    <circle cx="520" cy="120" r="5"/>
    <circle cx="420" cy="210" r="5"/>
    <circle cx="700" cy="170" r="5"/>
    <circle cx="1080" cy="150" r="5"/>
  </g>

  <!-- Title -->
  <text x="70" y="120"
        font-family="Segoe UI, Arial"
        font-size="48"
        font-weight="700"
        fill="white">
    SATVIK PANDURANGI
  </text>

  <!-- Subtitle -->
  <text x="70" y="165"
        font-family="Segoe UI, Arial"
        font-size="24"
        fill="#58A6FF">
    Electronics &amp; Communication Engineering
  </text>

  <!-- Skills -->
  <text x="70" y="215"
        font-family="Segoe UI, Arial"
        font-size="20"
        fill="#c9d1d9">
    Embedded Systems • IoT • Android • AI
  </text>

  <!-- Motto -->
  <text x="70" y="255"
        font-family="Segoe UI, Arial"
        font-size="16"
        fill="#8b949e">
    Building real-world engineering projects
  </text>

  <!-- Chip -->
  <rect x="980" y="70" width="120" height="120" rx="12"
        fill="none"
        stroke="url(#accent)"
        stroke-width="3"/>

  <rect x="1010" y="100" width="60" height="60"
        fill="none"
        stroke="#58A6FF"
        stroke-width="2"/>

  <g stroke="#58A6FF" stroke-width="2">
    <line x1="980" y1="85" x2="960" y2="85"/>
    <line x1="980" y1="105" x2="960" y2="105"/>
    <line x1="980" y1="125" x2="960" y2="125"/>
    <line x1="980" y1="145" x2="960" y2="145"/>
    <line x1="980" y1="165" x2="960" y2="165"/>

    <line x1="1100" y1="85" x2="1120" y2="85"/>
    <line x1="1100" y1="105" x2="1120" y2="105"/>
    <line x1="1100" y1="125" x2="1120" y2="125"/>
    <line x1="1100" y1="145" x2="1120" y2="145"/>
    <line x1="1100" y1="165" x2="1120" y2="165"/>
  </g>
</svg>